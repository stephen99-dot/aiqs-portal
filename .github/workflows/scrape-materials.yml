name: Scrape live material prices

# Runs on GitHub's servers (open internet) — the one place this project can reach
# the supplier sites. Scrapes the product URLs in server/materials-urls.json for
# real price + image + direct link, writes server/materials-live.json, and commits
# it back. The app imports that file on boot, so this is what puts REAL data in
# the catalogue.
#
# For reliable results against Cloudflare/Akamai-protected retailers, add a repo
# secret SCRAPER_API_KEY (ScraperAPI-compatible). Without it the job tries direct
# and the big retailers will likely block it.

on:
  workflow_dispatch:        # run on demand from the Actions tab
  schedule:
    - cron: '0 6 * * 1,4'   # Monday + Thursday 06:00 UTC — fills the catalogue ~240 items/week

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Scrape live prices (re-checks + discovery)
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          SCRAPER_RENDER: 'false'
          # Discovery budget per run — each discovery is ~2 proxied fetches
          # (search page + product page). Raise via repo variables once you
          # can see the ScraperAPI credit burn.
          DISCOVER_LIMIT: ${{ vars.MATERIALS_DISCOVER_LIMIT || '120' }}
          SUPPLIERS_PER_MATERIAL: ${{ vars.MATERIALS_SUPPLIERS_PER_MATERIAL || '2' }}
        run: node server/scrapeToJson.js

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server/materials-live.json server/materials-resolved.json
          if git diff --staged --quiet; then
            echo "No price changes to commit."
          else
            git commit -m "chore: update live scraped material prices"
            git push
          fi
