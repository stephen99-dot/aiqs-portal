name: Takeoff evals

# Phase 11 regression gate: run the takeoff eval harness whenever a change could
# move takeoff quality — prompts, models, the wrapper, the pipeline, the pricer,
# or the fixtures themselves. A non-zero exit (value drift >5% or a missing-item
# regression on any golden job) blocks the merge.

on:
  pull_request:
    paths:
      - 'server/chat.js'
      - 'server/agenticTakeoff.js'
      - 'server/verifyTakeoff.js'
      - 'server/anthropicClient.js'
      - 'server/deterministicPricer.js'
      - 'server/boqGenerator.js'
      - 'server/evals/**'
  workflow_dispatch: {}

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run takeoff evals
        run: node server/evals/runEval.js --value-threshold 5
